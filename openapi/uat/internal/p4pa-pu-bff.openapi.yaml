    SpontaneousFormDetailDTO:
      type: object
      properties:
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
        updateTraceId:
          type: string
        spontaneousFormId:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
          readOnly: true
        debtPositionTypeOrgCount:
          type: integer
          format: int32
        code:
          type: string
          readOnly: true
        structure:
          type: 'SpontaneousFormStructure'
        dictionary:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: object
              additionalProperties:
                type: string
          description: |
            Dictionary of localized messages for spontaneous form fields.
            The map has three levels of nesting:
            1. First level: language code (e.g. "EN")
            2. Second level: field name (e.g. "payment_field")
            3. Third level: attribute name and message for that field (e.g. "label", "error", "help")

            Example:
            {
              "EN": {
                "payment_field": {
                  "label": "Payment description",
                  "error": "Specify the payment description",
                  "help": "Specify the payment description"
                }
              }
            }
      required:
        - code
        - organizationId
        - structure
