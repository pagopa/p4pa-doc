    put:
      tags:
        - Organizations
      summary: "update an organization"
      operationId: updateOrganization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: 'Organization'
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - Access denied
        '500':
          description: Internal Server Error
