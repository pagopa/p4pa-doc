openapi: 3.0.1
info:
  title: p4pa-pu-sil
  description: Api and Models
  version: "1.0.0"
paths:
  /sil/organization/{orgFiscalCode}/send-notification:
    post:
      tags:
        - SendNotification
      summary: Create notification
      description: Create initial notification
      operationId: createSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: 'CreateNotificationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'CreateNotificationResponse'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /sil/organization/{orgFiscalCode}/send-notification/{sendNotificationId}:
    get:
      tags:
        - SendNotification
      summary: get send notification
      description: get send notification
      operationId: getSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'SendNotificationDTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
    delete:
      tags:
        - SendNotification
      summary: Delete notification
      description: Delete notification
      operationId: deleteSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /sil/organization/{orgFiscalCode}/send-notification/{sendNotificationId}/legal-facts:
    get:
      tags:
        - SendNotification
      summary: get send legal fact list
      description: get send legal fact list
      operationId: getLegalFacts
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: 'LegalFactDTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
  /sil/organization/{orgFiscalCode}/send-notification/{sendNotificationId}/legal-facts/{legalFactId}:
    get:
      tags:
        - SendNotification
      summary: get send legal fact download metadata
      description: get send legal fact metadata for downloading document content
      operationId: getLegalFactDownloadMetadata
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
        - name: legalFactId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'LegalFactDownloadMetadataDTO'
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Notification not found
        '500':
          description: Internal server error
  /sil/organization/{orgFiscalCode}/printpaymentnotice/{iuv}:
    get:
      tags:
        - PrintPaymentNotice
      operationId: generateNotice
      summary: Print payment notice as PDF
      description: Print payment notice as PDF
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: iuv
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid request
        '404':
          description: Notification not found
        '500':
          description: Internal server error
  /internal/orgSilService/{orgSilServiceId}/actualization:
    get:
      tags:
        - Actualization
      summary: actualize amount
      description: actualize amount
      operationId: actualize
      parameters:
        - name: orgSilServiceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: nav
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActualizationResultDTO'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '412':
          description: Precondition Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /internal/orgSilService/{orgSilServiceId}/notify-payment:
    post:
      tags:
        - notifyPayment
      summary: notifyPayment
      description: notifies the payment details executed
      operationId: notifyPayment
      parameters:
        - name: orgSilServiceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: 'PaidInstallmentDTO'
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/debtor/{debtorFiscalCode}/payment/history:
    get:
      tags:
        - DebtorQueryPayment
      summary: retrieve payment history for a debtor
      description: |
        Service to retrieve payment history (paid debt positions) for a specific debtor
        within a optional date range (default from today to the day after),
        optionally filtered by organization IPA code.
      operationId: getPaymentHistory
      parameters:
        - name: debtorFiscalCode
          description: the fiscal code of the debtor
          in: path
          required: true
          schema:
            type: string
        - name: debtorEntityType
          description: the entity type of the debtor
          in: query
          schema:
            type: 'PersonEntityType'
        - name: dateFrom
          description: start date for payment history (ISO 8601 format)
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: dateTo
          description: end date for payment history (ISO 8601 format)
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: ipaCode
          description: organization IPA code to filter results
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentHistoryResponseDTO'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/debtor/{debtorFiscalCode}/payment/unpaid:
    get:
      tags:
        - DebtorQueryPayment
      summary: retrieve unpaid debt positions for a debtor
      description: |
        Service to retrieve unpaid debt positions for a specific debtor,
        optionally filtered by organization IPA code.
      operationId: getUnpaidDebtPositions
      parameters:
        - name: debtorFiscalCode
          description: the fiscal code of the debtor
          in: path
          required: true
          schema:
            type: string
        - name: debtorEntityType
          description: the entity type of the debtor
          in: query
          schema:
            type: 'PersonEntityType'
        - name: ipaCode
          description: organization IPA code to filter results
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnpaidDebtPositionsResponseDTO'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/import:
    post:
      tags:
        - Import
      summary: request a massive import operation
      description: |
        Service to request a massive import operation. The upload of the file
        is done invoking the url returned by this service.
      operationId: massiveImportRequest
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportFileRequestDTO'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportFileResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/import/{importId}:
    get:
      tags:
        - Import
      summary: request processing status of massive import operation
      description: |
        Service to request the processing status of massive import operation and the url to download
        output files (where applicable, based on processing status and import type).
      operationId: massiveImportStatus
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: importId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStatusResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/export/paid:
    post:
      tags:
        - Export
      summary: request a massive export operation
      description: Service to request a massive export operation.
      operationId: massivePaidExportRequest
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaidExportRequestDTO"
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportFileResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/export/classifications:
    post:
      tags:
        - Export
      summary: request a massive export operation
      description: Service to request a massive export operation.
      operationId: massiveClassificationsExportRequest
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassificationsExportRequestDTO"
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportFileResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/export/{exportId}:
    get:
      tags:
        - Export
      summary: request processing status of export operation
      description: |
        Service to request the processing status of export operation and the url to download
        output files (where applicable, based on processing status and export type).
      operationId: massiveExportStatus
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: exportId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStatusResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/debt-position:
    post:
      tags:
        - DebtPosition
      summary: create a single debt position
      description: |
        Service to create a single debt position.
      operationId: createSingleDebtPosition
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebtPositionDTO"
        required: true
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/debt-position/{iud}:
    put:
      tags:
        - DebtPosition
      operationId: manageDebtPositionInstallments
      summary: manage a single debt position
      description: |
        Service to manage a single debt position, allowing to add, modify or delete one or more installments.
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: iud
          in: path
          required: true
          schema:
            type: string
          description: The IUD of any installment of the debtPosition/paymentOption that will be managed by this operation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManageDebtPositionDTO"
        required: true
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionDTO'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuSilErrorDTO"
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/payment:
    post:
      tags:
        - Payment
      summary: request an instant payment operation
      description: |
        Request an instant payment operation, passing in input payment data,
        and receiving in output the url to trigger the payment operation.
      operationId: requestInstantPayment
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstantPaymentRequest"
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/payment/notice/{nav}:
    get:
      tags:
        - Payment
      summary: handle the payment of an already existing payment notice
      description: |
        Service to request the start of online payment of a payment notice, or alternatively the download
        of notice as PDF file; in input accepts the notice number, and if the notice is payable, returns
        the url to trigger the payment operation and the url to download the PDF notice file; if the notice
        is not payable, returns the reason of error.
      operationId: requestNoticePayment
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: nav
          description: the notice number of the notice to pay
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NoticeNumber'
        - name: callbackUrl
          description: |
            If the nav is payable, this parameter is used to specify
            the url to redirect the navigation flow to, after completing the payment operation.
            If not set, a generic PU page will be used. The parameters paymentId and outcome (OK/KO)
            will be added to query string of url.
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/payment/{idType}/{id}:
    get:
      tags:
        - Payment
      summary: request processing status of payment operation
      description: |
        Service to request the processing status of payment operation and the url to download
        output files (where applicable, based on processing status and export type).
      operationId: paymentStatus
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: idType
          description: the type of identifier used to identify the payment operation
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/QueryPaymentStatusType'
        - name: id
          description: the identifier used to identify the payment
          in: path
          required: true
          schema:
            type: string
        - name: withReceiptBytes
          description: if true, the response will contain the receipt bytes
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentStatusResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/assessment/payment-reporting:
    get:
      tags:
        - Assessment
      summary: retrieve the assessment data by payment reporting unique identifier
      description: |
        Service to retrieve the assessment data given the payment reporting id (IUF).
      operationId: getAssessmentByPaymentReporting
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: iuf
          in: query
          description: payment reporting unique identifier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAssessmentResponseDTO'
  /sil/organization/{orgFiscalCode}/assessment/bill:
    get:
      tags:
        - Assessment
      summary: retrieve the assessment data by bill data
      description: |
        Service to retrieve the assessment data given the reporting id (IUF) or invoice data.
      operationId: getAssessmentByBill
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
        - name: billYear
          in: query
          description: the year of the bill to retrieve the assessment data for
          required: true
          schema:
            type: string
            pattern: '^\d{4}$'
        - name: billNumber
          in: query
          description: the bill code to retrieve the assessment data for
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAssessmentResponseDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
  /sil/organization/{orgFiscalCode}/checkout:
    post:
      tags:
        - Checkout
      operationId:
        checkout
      parameters:
        - name: orgFiscalCode
          description: the fiscal code of the organization
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrgFiscalCode'
      responses:
        '301':
          description: Moved Permanently
          headers:
            Location:
              description: Checkout URL
              schema:
                type: string
                format: url
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
security:
  - BearerAuth: []
components:
  schemas:
    ActualizationResultDTO:
      type: object
      properties:
        updatedAmountCents:
          type: integer
          format: int64
          description: updated amount (in euro cents), if the invocation was successful
        balance:
          type: string
          description: updated balance envelope string, if service active, if successful invocation and balance envelope returned from discounting service
        errorCode:
          type: string
          description: Error code in case of KO outcome
        errorDescription:
          type: string
          description: Error description in case of KO outcome
        nav:
          type: string
          description: Debt Position unique number
        iun:
          type: string
          description: Unique identifier of the notification
        notificationFeeCents:
          type: integer
          format: int64
          description: Notification fee amount (in euro cents)
        displayDate:
          type: string
          format: date-time
          description: date of ISO 8601 display of the notification by the recipient
        completionDeadlineDate:
          type: string
          format: date-time
          description: ISO 8601 date of completion due to expiry of deadline
    PuSilErrorDTO:
      type: object
      required:
        - category
        - message
      properties:
        category:
          type: string
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - INVALID_FILE
            - FILE_UPLOAD_ERROR
            - CONFLICT
            - UNAUTHORIZED
            - GENERIC_ERROR
        message:
          type: string
        traceId:
          type: string
    OrgFiscalCode:
      type: string
      pattern: '^\d{11}$'
    NoticeNumber:
      type: string
      pattern: '^\d{18}$'
    ImportFileRequestDTO:
      type: object
      required:
        - importFileType
      properties:
        importFileType:
          type: 'ImportFileType'
    ImportFileResponseDTO:
      type: object
      required:
        - importId
        - uploadUrl
        - authorizationToken
        - importPath
      properties:
        importId:
          type: string
        uploadUrl:
            type: string
            description: The url to upload the file to, using a POST request with the file as body.
        authorizationToken:
            type: string
