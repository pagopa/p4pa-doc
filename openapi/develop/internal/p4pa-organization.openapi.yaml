openapi: 3.0.1
info:
  title: p4pa-organization
  description: Api and Models
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /organization:
    post:
      tags:
        - Organization
      summary: Create an Organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'Organization'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
    put:
      tags:
        - Organization
      summary: Update an Organization
      operationId: updateOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: 'OrganizationDetailDTO'
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /organization/{organizationId}/apiKey:
    put:
      tags:
        - Organization
      summary: Save encrypted API keys for IO or SEND
      operationId: encryptAndSaveApiKey
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationApiKeys'
      responses:
        '200':
          description: OK
        '404':
          description: Organization Not Found
        '500':
          description: Internal Server Error
  /organization/{organizationId}/status/{newStatus}:
    put:
      tags:
        - Organization
      summary: Save encrypted API keys for IO or SEND
      operationId: updateOrganizationStatus
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: newStatus
          in: path
          required: true
          schema:
            type: 'OrganizationStatus'
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '404':
          description: Organization Not Found
        '500':
          description: Internal Server Error
  /organization/{organizationId}:
    get:
      tags:
        - Organization
      operationId: getOrganization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: 'OrganizationDetailDTO'
        '404':
          description: Organization Not Found
        '500':
          description: Internal Server Error
  /organization/{organizationId}/apiKey/{keyType}:
    get:
      tags:
        - Organization
      summary: Get API keys for IO or SEND
      operationId: getOrganizationApiKey
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: keyType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OrganizationApiKeyType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
        '404':
          description: Organization Not Found
        '500':
          description: Internal Server Error
  /organization-sil-service:
    post:
      tags:
        - OrganizationSilService
      summary: Save SIL service configuration for an organization with encryption
      operationId: createOrUpdateOrgSilService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgSilServiceDTO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgSilServiceDTO'
        '404':
          description: Organization Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationErrorDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationErrorDTO'
  /organization-sil-service/{orgSilServiceId}:
    get:
      tags:
        - OrganizationSilService
      summary: Get SIL service configuration for an organization by ID decrypted
      operationId: getOrgSilService
      parameters:
        - name: orgSilServiceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgSilServiceDTO'
        '404':
          description: Organization Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationErrorDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationErrorDTO'
  /brokers/{brokerId}/apiKey:
    get:
      tags:
        - Broker
      summary: Retrieve decrypted API keys for a broker
      operationId: getBrokerApiKeys
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerApiKeys'
        '404':
          description: Not Found
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BrokerApiKeys'
        '500':
          description: Internal Server Error
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BrokerApiKeys'
    put:
      tags:
        - Broker
      summary: Save encrypted API keys
      operationId: encryptAndSaveBrokerApiKey
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrokerApiKey'
      responses:
        '200':
          description: OK
        '404':
          description: Organization Not Found
        '500':
          description: Internal Server Error
  /broker/{brokerId}/apiKey/{keyType}:
    get:
      tags:
        - Broker
      summary: Get API key
      operationId: getBrokerApiKey
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: keyType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/BrokerApiKeyType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
        '404':
          description: Broker Not Found
        '500':
          description: Internal Server Error
  /taxonomies/sync:
    get:
      tags:
        - Taxonomy
      summary: Sync all taxonomies
      operationId: syncTaxonomies
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: integer
        "400":
          description: Invalid request
        "500":
          description: Internal server error
components:
  schemas:
    BrokerApiKeys:
      type: object
      properties:
        syncPaymentsReportingKey:
          type: string
        syncKey:
          type: string
        acaKey:
          type: string
        gpdKey:
          type: string
        generateNoticeKey:
          type: string
    BrokerApiKey:
      type: object
      required:
        - keyType
        - apiKey
      properties:
        keyType:
          $ref: '#/components/schemas/BrokerApiKeyType'
        apiKey:
          type: string
    BrokerApiKeyType:
      type: string
      enum:
        - SYNC_PAYMENTS_REPORTING
        - SYNC
        - ACA
        - GPD
        - GENERATE_NOTICE
    OrganizationApiKeys:
      type: object
      required:
        - keyType
        - apiKey
      properties:
        keyType:
          type: string
          enum:
            - IO
            - SEND
            - GENERATE_NOTICE
        apiKey:
          type: string
    OrganizationCreateDTO:
      type: object
      required:
        - ipaCode
        - orgFiscalCode
        - orgName
        - status
        - flagNotifyIo
        - flagNotifyOutcomePush
        - flagPaymentNotification
        - flagTreasury
        - pdndEnabled
      properties:
        externalOrganizationId:
          type: string
        ipaCode:
          type: string
        orgFiscalCode:
          type: string
        orgName:
          type: string
        orgTypeCode:
          type: string
        orgEmail:
          type: string
        postalIban:
          type: string
        iban:
          type: string
        password:
          type: string
        segregationCode:
          type: string
        cbillInterBankCode:
          type: string
        orgLogo:
          type: string
        status:
          type: 'OrganizationStatus'
        additionalLanguage:
          type: 'OrganizationAdditionalLanguage'
        startDate:
          type: string
          format: date
        brokerId:
          type: integer
          format: int64
        ioApiKey:
          type: string
        sendApiKey:
          type: string
        generateNoticeApiKey:
          type: string
        flagNotifyIo:
          type: boolean
        flagNotifyOutcomePush:
          type: boolean
        flagPaymentNotification:
          type: boolean
        flagTreasury:
          type: boolean
        pdndEnabled:
          type: boolean
        flagPaymentsReporting:
          type: boolean
        flagClassification:
          type: boolean
        address:
          type: string
        zipCode:
          type: string
        city:
          type: string
    OrganizationApiKeyType:
      type: string
      enum:
        - IO
        - SEND
        - GENERATE_NOTICE
    OrganizationErrorDTO:
      type: object
      required:
        - category
        - code
        - message
      properties:
        category:
          type: string
          enum:
            - ORGANIZATION_NOT_FOUND
            - ORGANIZATION_CONFLICT
            - ORGANIZATION_BAD_REQUEST
            - ORGANIZATION_GENERIC_ERROR
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
    OrgSilServiceDTO:
      type: object
      required:
        - organizationId
        - applicationName
        - serviceUrl
        - serviceType
        - flagLegacy
      properties:
        orgSilServiceId:
          type: integer
          format: int64
          description: Unique identifier for the organization SIL service
          example: 12345
        organizationId:
          type: integer
          format: int64
          description: ID of the organization this service belongs to
          example: 67890
        applicationName:
          type: string
          description: Name of the application
          maxLength: 255
          example: "Example Application"
        serviceUrl:
          type: string
          description: URL endpoint for the service
          maxLength: 500
          example: "https://app.example.com"
        serviceType:
          type: 'OrgSilServiceType'
        flagLegacy:
          type: boolean
          description: Indicates if this is a legacy service
          default: false
          example: false
        authConfig:
          type: 'SilServiceAuthConfigDTO'
