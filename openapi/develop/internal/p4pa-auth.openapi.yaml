openapi: 3.0.1
info:
  title: p4pa-auth
  description: Api and Models
  version: 0.0.1
servers:
  - url: "http://localhost:8080/payhub"
paths:
  /.well-known/jwks.json:
    get:
      tags:
        - wellKnown
      operationId: jwks
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
  /oauth/token:
    post:
      tags:
        - authn
      operationId: postToken
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: grant_type
          in: query
          required: true
          schema:
            enum: [
              "urn:ietf:params:oauth:grant-type:token-exchange",
              "client_credentials"
            ]
            type: string
        - name: subject_token
          description: "ID Token"
          in: query
          schema:
            type: string
        - name: subject_issuer
          description: "Issuer del subject_token"
          in: query
          schema:
            type: string
        - name: subject_token_type
          in: query
          schema:
            enum: [
              "urn:ietf:params:oauth:token-type:jwt"
            ]
            type: string
        - name: scope
          in: query
          required: true
          schema:
            enum: [
              "openid"
            ]
            type: string
        - name: client_secret
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '429':
          description: Too Many Requests
        '500':
          description: Server ERROR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorDTO'
  /oauth/token/limited:
    post:
      tags:
        - authn
      operationId: postLimitedToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LimitedTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '403':
          description: Forbidden
        '409':
          description: Conflict
        '429':
          description: Too Many Requests
        '500':
          description: Server ERROR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorDTO'
  /oauth/userinfo:
    get:
      tags:
        - authn
      operationId: getUserInfo
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Authentication failed
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
        '500':
          description: Server ERROR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorDTO'
  /oauth/userinfo/{mappedExternalUserId}:
    get:
      tags:
        - authz
      operationId: getUserInfoFromMappedExternaUserId
      parameters:
        - name: mappedExternalUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
        '500':
          description: Server ERROR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorDTO'
  /oauth/revoke:
    post:
      tags:
        - authn
      operationId: logout
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            enum: [
              "piattaforma-unitaria"
            ]
            type: string
        - name: token
          description: "Access Token"
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
        '401':
          description: Invalid client_id
  /oauth/clients/{organizationIpaCode}:
    get:
      tags:
        - authz
      operationId: getClients
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientNoSecretDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
    post:
      tags:
        - authz
      operationId: registerClient
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict
        '429':
          description: Too Many Requests
  /oauth/clients/search:
    get:
      tags:
        - authz
      operationId: getClientsSearch
      x-spring-paginated: true
      parameters:
        - name: organizationIpaCode
          in: query
          required: true
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: string
        - name: clientName
          in: query
          schema:
            type: string
        - name: page
          in: query
          description : "Zero-based page index (0..N)"
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description : "The size of the page to be returned"
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: sort
          in: query
          description: "Sorting criteria in the format: property,(asc|desc). Default sort order is ascending. Multiple sort criteria are supported."
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDTOPage'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
  /oauth/clients/{organizationIpaCode}/{clientId}/generate:
    post:
      tags:
        - authz
      operationId: generateClientSecret
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
  /oauth/clients/{organizationIpaCode}/{clientId}:
    delete:
      tags:
        - authz
      operationId: revokeClient
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: OK
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
    get:
      tags:
        - authz
      operationId: getClient
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
        '500':
          description: Internal Server Error
  /am/users:
    post:
      tags:
        - authz
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
  /am/operators/{organizationIpaCode}:
    get:
      tags:
        - authz
      operationId: getOrganizationOperators
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: fiscalCode
          in: query
          description: "Fiscal Code"
          schema:
            type: string
        - name: firstName
          in: query
          description: "First Name"
          schema:
            type: string
        - name: lastName
          in: query
          description: "Last Name"
          schema:
            type: string
        - name: page
          in: query
          description: "The number of the page"
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: "Number of items"
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorsPage'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
    post:
      tags:
        - authz
      operationId: createOrganizationOperator
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperatorRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDTO'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
  /am/operators/{organizationIpaCode}/{mappedExternalUserId}:
    delete:
      tags:
        - authz
      operationId: deleteOrganizationOperator
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: mappedExternalUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: OK
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
    get:
      tags:
        - authz
      operationId: getOrganizationOperator
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: mappedExternalUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDTO'
        '204':
          description: OK
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
  /am/operators/{organizationIpaCode}/byExternalUserId:
    delete:
      tags:
        - authz
      operationId: deleteOrganizationOperatorByExternalUserId
      parameters:
        - name: organizationIpaCode
          in: path
          required: true
          schema:
            type: string
        - name: X-externalUserId
          in: header
          description: The IAM User ID
          required: true
          schema:
            type: string
      responses:
        '204':
          description: OK
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '412':
          description: ToS acceptance missing
        '429':
          description: Too Many Requests
security:
  - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    LimitedTokenRequest:
      type: object
      required:
        - organizationId
        - app
        - resource
      properties:
        organizationId:
          type: integer
          format: int64
        app:
          type: string
        resource:
          type: string
        resourceId:
          type: string
        expireInSeconds:
          type: integer
          format: int64
        singleUsage:
          type: boolean
        sessionData:
          type: object
          additionalProperties: true
    AccessToken:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: Bearer
        expires_in:
          type: integer
    ClientDTO:
      type: object
      required:
        - clientId
        - clientName
        - organizationIpaCode
        - clientSecret
      properties:
        clientId:
          type: string
        clientName:
          type: string
        organizationIpaCode:
          type: string
        clientSecret:
          type: string
    ClientNoSecretDTO:
      type: object
      required:
        - clientId
        - clientName
        - organizationIpaCode
      properties:
        clientId:
          type: string
        clientName:
          type: string
        organizationIpaCode:
          type: string
    CreateClientRequest:
      type: object
      required:
        - clientName
      properties:
        clientName:
          pattern: '^[a-zA-Z0-9-_]*$'
          type: string
    UserDTO:
      type: object
      required:
        - externalUserId
        - firstName
        - lastName
        - fiscalCode
      properties:
        externalUserId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fiscalCode:
          type: string
    UserInfo:
      type: object
      required:
        - userId
        - mappedExternalUserId
        - fiscalCode
        - familyName
        - name
        - email
        - issuer
        - organizations
        - canManageUsers
        - traceId
        - _type
      discriminator:
        propertyName: _type
        mapping:
          Limited: '#/components/schemas/UserInfoLimitedScope'
      properties:
        userId:
          type: string
        mappedExternalUserId:
          type: string
        fiscalCode:
          type: string
        familyName:
          type: string
        name:
          type: string
        issuer:
          type: string
        organizationAccess:
          type: string
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/UserOrganizationRoles'
        brokerId:
          type: integer
          format: int64
        brokerFiscalCode:
          type: string
        canManageUsers:
          type: boolean
        systemUser:
          type: boolean
        traceId:
          type: string
        _type:
          type: string
    UserOrganizationRoles:
      type: object
      required:
        - operatorId
        - organizationId
        - organizationIpaCode
        - organizationFiscalCode
        - roles
      properties:
        operatorId:
          type: string
        organizationId:
          type: integer
          format: int64
        organizationIpaCode:
          type: string
        organizationFiscalCode:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
    OperatorsPage:
      type: object
      required:
        - content
        - pageNo
        - pageSize
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OperatorDTO'
          description: "The list of organization operators"
        pageNo:
          type: integer
          format: int32
          description: "Number of page"
        pageSize:
          type: integer
          format: int32
          description: "Number of elements in the page"
        totalElements:
          type: integer
          format: int32
          description: "Number of total elements"
        totalPages:
          type: integer
          format: int32
          description: "Number of total pages"
    OperatorDTO:
      type: object
      required:
        - userId
        - mappedExternalUserId
        - userCode
        - operatorId
        - roles
        - organizationIpaCode
      properties:
        userId:
          type: string
        mappedExternalUserId:
          type: string
        userCode:
          type: string
        operatorId:
          type: string
        roles:
          type: array
          items:
            type: string
        organizationIpaCode:
          type: string
        fiscalCode:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        lastLogin:
          type: string
          format: date-time
    CreateOperatorRequest:
      type: object
      required:
        - externalUserId
        - firstName
        - lastName
        - roles
        - email
      properties:
        externalUserId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fiscalCode:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
    AuthErrorDTO:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          enum:
            - AUTH_GENERIC_ERROR
            - AUTH_NOT_FOUND
            - AUTH_USER_UNAUTHORIZED
            - invalid_request
            - invalid_client
            - invalid_scope
            - invalid_grant
            - unsupported_grant_type
        code:
          type: string
        error_description:
          type: string
          x-field-extra-annotation: "@com.fasterxml.jackson.annotation.JsonProperty(\"error_description\")"
        traceId:
          type: string
    ClientDTOPage:
      type: object
      required:
        - content
        - pageNo
        - pageSize
        - totalElements
        - totalPages
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ClientNoSecretDTO'
          description: "The list of sil client"
        pageNo:
          type: integer
          format: int32
          description: "Number of page"
        pageSize:
          type: integer
          format: int32
          description: "Number of elements in the page"
        totalElements:
          type: integer
          format: int32
          description: "Number of total elements"
        totalPages:
          type: integer
          format: int32
          description: "Number of total pages"
    UserInfoLimitedScope:
      type: object
      required:
        - resource
      allOf:
        - $ref: '#/components/schemas/UserInfo'
      properties:
        resource:
          $ref: '#/components/schemas/LimitedScopeResource'
    LimitedScopeResource:
      type: object
      required:
        - app
        - organization
        - resource
        - resourceId
        - singleUsage
      properties:
        app:
          type: string
        organization:
          $ref: '#/components/schemas/UserOrganizationRoles'
        resource:
          type: string
        resourceId:
          type: string
        singleUsage:
          type: boolean
        sessionData:
          type: object
          additionalProperties: true
