openapi: 3.0.1
info:
  title: p4pa-debt-positions
  description: Api and Models
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  /debt-positions:
    post:
      tags:
        - debt-position
      operationId: createDebtPosition
      parameters:
        - name: massive
          in: query
          description: Indicates if the operation is massive (true) or single (false).
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebtPositionDTO"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionErrorDTO"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionErrorDTO"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionErrorDTO"
        "500":
          description: Internal server error
  /debt-positions/{debtPositionId}:
    get:
      tags:
        - debt-position
      operationId: getDebtPosition
      parameters:
        - name: debtPositionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the debt position
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
    delete:
      tags:
        - debt-position
      operationId: deleteDebtPosition
      parameters:
        - name: debtPositionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the debt position
      responses:
        "204":
          description: No content
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionErrorDTO"
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/by-installmentId/{installmentId}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionByInstallmentId
      parameters:
        - name: installmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the installment
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/by-nav/{organizationId}/{nav}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionsByOrganizationIdAndNav
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: nav
          in: path
          required: true
          schema:
            type: string
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/by-iuv/{organizationId}/{iuv}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionsByOrganizationIdAndIuv
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: iuv
          in: path
          required: true
          schema:
            type: string
          description: The iuv of the installments
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
            description: An array of debt position origins to filter by; if null, no filter is applied
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/by-iud/{organizationId}/{iud}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionsByOrganizationIdAndIud
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: iud
          in: path
          required: true
          schema:
            type: string
          description: The iud of the installments
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
            description: An array of debt position origins to filter by; if null, no filter is applied
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/by-debtor/{fiscalCode}/{entityType}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionsByDebtorFiscalCodeAndDebtorEntityType
      parameters:
        - name: fiscalCode
          in: path
          required: true
          schema:
            type: string
          description: The fiscal code of the debtor
        - name: entityType
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PersonEntityType"
          description: The entity type of the debtor
        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/InstallmentStatus"
            description: An array of statuses of the installments; if null, no filter is applied
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
            description: An array of debt position origins to filter by; if null, no filter is applied
        - name: debtPositionTypeOrgCodesToExclude
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: organizationIds
          in: query
          required: true
          schema:
            type: array
            items:
              type: integer
              format: int64
          description: The IDs of the organizations
        - name: dateFrom
          in: query
          description: Start date (inclusive)
          required: false
          schema:
            type: string
            format: date-time
            example: 2025-01-01T00:00:00
        - name: dateTo
          in: query
          description: End date (inclusive)
          required: false
          schema:
            type: string
            format: date-time
            example: 2025-01-01T00:00:00
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/{debtPositionId}/publish:
    put:
      tags:
        - debt-position
      operationId: publishDebtPosition
      parameters:
        - name: debtPositionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the debt position
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPositionErrorDTO"
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /debt-positions/ingestion-flow-file/{ingestionFlowFileId}:
    get:
      tags:
        - debt-position
      operationId: getDebtPositionsByIngestionFlowFileId
      parameters:
        - name: ingestionFlowFileId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the ingestion flow file
        - name: statusToExclude
          in: query
          description: Indicates the list of status to be excluded
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/InstallmentStatus"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDebtPositions"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
      x-spring-paginated: true
  /debt-positions/{debtPositionId}/massive/transfer-ibans:
    put:
      tags:
        - debt-position
      operationId: updateTransferIbansAndSyncDebtPosition
      parameters:
        - name: debtPositionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTransferIbansAndSyncDebtPositionRequestDTO"
          required: true
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized - Missing or invalid token
        '403':
          description: Forbidden - Access denied
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /installments:
    get:
      tags:
        - installment
      summary: "Retrieve the list of paginated Installments filtered by params"
      operationId: getInstallmentsByFilters
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: operatorExternalUserId
          in: query
          required: true
          schema:
            type: string
        - name: dueDateTimeFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dueDateTimeTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: iuv
          in: query
          schema:
            type: string
        - name: iud
          in: query
          schema:
            type: string
        - name: fiscalCode
          in: query
          schema:
            type: string
        - name: debtPositionOrigins
          in: query
          schema:
            type: array
            items:
              type: 'DebtPositionOrigin'
        - name: debtPositionTypeOrgId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            type: 'InstallmentStatus'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedInstallmentsView'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
      x-spring-paginated: true
  /installments/debtor:
    get:
      tags:
        - installment
      operationId: getInstallmentsByIuvOrNav
      parameters:
        - name: iuvOrNav
          in: query
          required: true
          schema:
            type: string
        - name: X-fiscal-code
          in: header
          required: false
          schema:
            type: string
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: statuses
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/InstallmentStatus"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstallmentDebtorDTO"
        "400":
          description: Invalid request
        "500":
          description: Internal server error
  /installments/{organizationId}/{nav}:
    get:
      tags:
        - installment
      operationId: getInstallmentsByOrganizationIdAndNav
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: nav
          in: path
          required: true
          schema:
            type: string
          description: The nav of the installments
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
            description: An array of debt position origins to filter by; if null, no filter is applied
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstallmentDTO"
        "400":
          description: Invalid request
        "500":
          description: Internal server error
  /installments/by-organizationId-and-receiptId:
    get:
      tags:
        - installment
      operationId: getInstallmentsByOrganizationIdAndReceiptId
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: receiptId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: receipt id
        - name: debtPositionOrigin
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
            description: An array of debt position origins to filter by; if null, no filter is applied
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstallmentDTO"
        "400":
          description: Invalid request
        "500":
          description: Internal server error
  /export/organization/{organizationId}/installments/paid:
    get:
      tags:
        - data-exports
      operationId: exportPaidInstallments
      description: "|
      The API returns a list of paid installments.
      **Note:** At least one of `paymentDate` or `installmentUpdateDateTime` must be provided.
      **Error:** If the size of the requested export is too large, the API will return an error."
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: operatorExternalUserId
          in: query
          required: true
          schema:
            type: string
        - name: paymentDateTimeFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: paymentDateTimeTo
          in: query
          schema:
            type: string
            format: date-time
        - name: installmentUpdateDateTimeFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: installmentUpdateDateTimeTo
          in: query
          schema:
            type: string
            format: date-time
        - name: debtPositionTypeOrgId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: debtPositionOrigins
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/DebtPositionOrigin"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedInstallmentsPaidView'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
              example:
                code: "DEBT_POSITION_BAD_REQUEST"
                message: "The number of InstallmentPaidViewNoPII records returned exceeds the maximum allowed"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
      x-spring-paginated: true
  /export/organization/{organizationId}/receipts/archiving:
    get:
      tags:
        - data-exports
      operationId: exportArchivingReceipts
      description: "|
      The API returns a list of archiving receipts.
      **Error:** If the size of the requested export is too large, the API will return an error."
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the organization
        - name: operatorExternalUserId
          in: query
          required: true
          schema:
            type: string
        - name: paymentDateFrom
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: paymentDateTo
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedReceiptsArchivingView'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
              example:
                code: "DEBT_POSITION_BAD_REQUEST"
                message: "The number of ReceiptsArchivingViewNOPII records returned exceeds the maximum allowed"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
      x-spring-paginated: true
  /receipts:
    post:
      tags:
        - receipt
      operationId: createReceipt
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptWithAdditionalNodeDataDTO"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDTO"
        "400":
          description: Invalid request
        "409":
          description: Debt position already exists and cannot be changed
        "500":
          description: Internal server error
  /receipts/{receiptId}:
    get:
      tags:
        - receipt
      operationId: getReceipt
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the receipt
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /receipts/{receiptId}/detail:
    get:
      tags:
        - receipt
      operationId: getReceiptDetail
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: The ID of the receipt
        - name: operatorExternalUserId
          in: query
          required: false
          schema:
            type: string
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: iud
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptDetailDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
  /receipts/{receiptId}/pdf:
    get:
      tags:
        - receipt
      operationId: getReceiptPdf
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Ok
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid request
        "404":
          description: Not Found
        "500":
          description: Internal server error
  /installments/{installmentId}:
    get:
      tags:
        - installment
      operationId: getInstallmentDetail
      parameters:
        - name: installmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: operatorExternalUserId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallmentDetailDTO"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionErrorDTO'
        '500':
          description: Server Error
          content:
