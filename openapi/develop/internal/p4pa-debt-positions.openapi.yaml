security:
  - BearerAuth: [ ]
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    DebtPositionDTO:
      required:
        - debtPositionOrigin
        - organizationId
        - debtPositionTypeOrgId
        - paymentOptions
        - flagPuPagoPaPayment
      type: object
      x-implements: [ "it.gov.pagopa.pu.debtpositions.dto.BaseDebtPosition" ]
      properties:
        debtPositionId:
          type: integer
          format: int64
        iupdOrg:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/DebtPositionStatus"
        debtPositionOrigin:
          $ref: "#/components/schemas/DebtPositionOrigin"
        organizationId:
          type: integer
          format: int64
        debtPositionTypeOrgId:
          type: integer
          format: int64
        validityDate:
          type: string
          format: date
        multiDebtor:
          type: boolean
        flagPuPagoPaPayment:
          type: boolean
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
        updateTraceId:
          type: string
        paymentOptions:
          type: array
          items:
            $ref: "#/components/schemas/PaymentOptionDTO"
    PaymentOptionDTO:
      required:
        - installments
        - totalAmountCents
        - paymentOptionType
      type: object
      x-implements: [ "it.gov.pagopa.pu.debtpositions.dto.BasePaymentOption" ]
      properties:
        paymentOptionId:
          type: integer
          format: int64
        debtPositionId:
          type: integer
          format: int64
        totalAmountCents:
          type: integer
          format: int64
        status:
          $ref: "#/components/schemas/PaymentOptionStatus"
        description:
          type: string
        paymentOptionType:
          type: 'PaymentOptionType'
        paymentOptionIndex:
          type: integer
          format: int32
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
        updateTraceId:
          type: string
        installments:
          type: array
          items:
            $ref: "#/components/schemas/InstallmentDTO"
    InstallmentDTO:
      required:
        - amountCents
        - debtor
        - remittanceInformation
      type: object
