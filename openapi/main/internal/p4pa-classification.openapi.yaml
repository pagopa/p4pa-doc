components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ClassificationErrorDTO:
      type: object
      required:
        - category
        - code
        - message
      properties:
        category:
          type: string
          enum:
            - CLASSIFICATION_NOT_FOUND
            - CLASSIFICATION_BAD_REQUEST
            - CLASSIFICATION_CONFLICT
            - CLASSIFICATION_GENERIC_ERROR
        code:
          type: string
        message:
          type: string
        traceId:
          type: string
    PagedFullClassificationView:
      type: object
      required:
        - content
        - size
        - totalElements
        - totalPages
        - number
      properties:
        content:
          type: array
          items:
            type: 'FullClassificationView'
        size:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
    PagedClassificationView:
      type: object
      required:
        - content
        - size
        - totalElements
        - totalPages
        - number
      properties:
        content:
          type: array
          items:
            type: 'ClassificationView'
        size:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
    PagedTreasuredClassification:
      type: object
      required:
        - content
        - size
        - totalElements
        - totalPages
        - number
      properties:
        content:
          type: array
          items:
            type: 'TreasuredClassificationDTO'
        size:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
    PagedClassificationPaidInstallmentsView:
      type: object
      required:
        - content
        - size
        - totalElements
        - totalPages
        - number
      properties:
        content:
          type: array
          items:
            type: 'ClassificationPaidInstallmentsView'
        size:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
    PagedAssessmentsView:
      type: object
      required:
        - content
        - size
        - totalElements
        - totalPages
        - number
      properties:
        content:
          type: array
          items:
            type: 'Assessments'
        size:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
        number:
          type: integer
      format: int64
    CreateAssessmentsRegistryByDebtPositionDTOAndIudRequest:
      type: object
      required:
        - debtPositionDTO
      properties:
        debtPositionDTO:
          type: "DebtPositionDTO"
        iudList:
          type: array
          items:
            type: string
    CreateAssessmentsDetail:
      type: object
      required:
        - assessmentRegistryId
        - iuds
      properties:
        assessmentRegistryId:
          type: integer
          format: int64
        iuds:
          type: array
          uniqueItems: true
          items:
            type: string
