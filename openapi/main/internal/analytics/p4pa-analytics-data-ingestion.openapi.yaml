openapi: 3.0.1
info:
  title: p4pa-analytics-data-ingestion
  description: Api and Models
  version: 0.0.1
paths:
  /workflows/{workflowId}/status:
    get:
      tags:
        - Workflow
      operationId: getWorkflowStatus
      summary: Get Workflow Status
      description: Retrieve the current status of a Temporal workflow by its ID.
      parameters:
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Workflow status retrieved successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatusDTO'
        '404':
          description: "Workflow not found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
  /schedules/{scheduleId}/info:
    get:
      tags:
        - Schedule
      operationId: getScheduleInfo
      summary: Get Schedule info
      description: Retrieve the info of a Temporal schedule by its ID.
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: 'ScheduleEnum'
      responses:
        '200':
          description: "Workflow status retrieved successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleInfoDTO'
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
  /workflow/debt-position-type-orgs-ingestion:
    post:
      tags:
        - DebtPositionTypeOrgsIngestion
      operationId: ingestDebtPositionTypeOrgs
      description: To start DebtPositionTypeOrgs ingestion
      responses:
        '201':
          description: "Workflow created successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowCreatedDTO'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
security:
  - BearerAuth: [ ]
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    WorkflowCreatedDTO:
      type: object
      required:
        - workflowId
        - runId
      properties:
        workflowId:
          type: string
        runId:
          type: string
    WorkflowStatusDTO:
      type: object
      required:
        - workflowId
        - workflowType
        - status
        - runId
        - taskQueue
      properties:
        workflowId:
          type: string
        workflowType:
          type: string
        status:
          type: 'WorkflowExecutionStatus'
        runId:
          type: string
        taskQueue:
          type: string
        startDateTime:
          type: string
          format: date-time
        executionDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        duration:
          type: string
          format: duration
    ScheduleInfoDTO:
      type: object
      required:
        - scheduleId
        - numActions
        - numActionsMissedCatchupWindow
        - numActionsSkippedOverlap
        - runningActions
        - recentActions
        - nextActionTimes
        - createdAt
        - lastUpdatedAt
      properties:
        scheduleId:
          type: 'ScheduleEnum'
        numActions:
          type: integer
          format: int64
        numActionsMissedCatchupWindow:
          type: integer
          format: int64
        numActionsSkippedOverlap:
          type: integer
          format: int64
        runningActions:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleExecutionInfoDTO'
        recentActions:
          type: array
          items:
            $ref: '#/components/schemas/RecentScheduleExecutionInfoDTO'
        nextActionTimes:
          type: array
          items:
            type: string
            format: date-time
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
    ScheduleExecutionInfoDTO:
      type: object
      required:
        - workflowId
        - runId
      properties:
        workflowId:
          type: string
        runId:
          type: string
    RecentScheduleExecutionInfoDTO:
      allOf:
        - $ref: "#/components/schemas/ScheduleExecutionInfoDTO"
        - type: object
          required:
            - scheduledAt
            - startedAt
          properties:
            scheduledAt:
              type: string
              format: date-time
            startedAt:
              type: string
              format: date-time
    ErrorDTO:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - GENERIC_ERROR
            - CONFLICT
        message:
          type: string
        traceId:
          type: string
