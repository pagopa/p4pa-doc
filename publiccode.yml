description:
  it:
    shortDescription: Sistema per la gestione digitale del ciclo di vita dei
      pagamenti della Pubblica Amministrazione, completamente integrato con
      l'ecosistema PagoPA.
    longDescription: La piattaforma permette di gestire in modo integrato il ciclo
      di vita delle posizioni debitorie di un Ente Pubblico come ad esempio le
      notifiche a valore legale e i pagamenti, garantendo un adeguamento
      costante alle evoluzioni normative e tecniche. La soluzione tecnologica si
      pone l’obiettivo di centralizzare e semplificare la gestione
      dell’integrazione con l’intero ecosistema PagoPA per gli Intermediari
      Tecnologici (come le Regioni) o Aziende Partner e gli Enti Creditori.
    features:
      - Integrazione completa con PagoPA
      - Monitoraggio del ciclo di vita dei pagamenti
      - Workflow interno per la gestione pagamenti
      - Dashboard e reportistica per controllo e analisi
